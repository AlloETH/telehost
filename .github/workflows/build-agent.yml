name: Build Agent Image

on:
  push:
    paths:
      - "Dockerfile.agent"
      - "entrypoint.sh"
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: openclaw-host

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.agent
          push: true
          tags: |
            ${{ env.REGISTRY }}/alloeth/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/alloeth/${{ env.IMAGE_NAME }}:${{ github.sha }}
